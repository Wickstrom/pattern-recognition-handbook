<style>
  /* Slide-number badge for marimo's slides layout.
     Only shown when the page is in slides mode (the .mo-slides-theme.reveal
     deck root that marimo's slides view renders into #root). Hidden in
     grid / vertical / scroll layouts. */
  .marimo-slide-num-badge {
    display: none;
    position: fixed;
    bottom: 12px;
    right: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    font: 500 13px/1.2 system-ui, -apple-system, "Segoe UI", sans-serif;
    letter-spacing: 0.02em;
    z-index: 2147483647;
    pointer-events: none;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
  }
  body:has(.mo-slides-theme.reveal) .marimo-slide-num-badge {
    display: block;
  }
</style>
<script>
  (function () {
    // Create the badge element from JS (not via a <div> in the snippet)
    // so the snippet itself stays valid inside <body>.
    var badge = document.createElement("div");
    badge.className = "marimo-slide-num-badge";
    badge.id = "marimo-slide-num-badge";
    badge.setAttribute("aria-hidden", "true");
    document.body.appendChild(badge);

    function getDeck() {
      return document.querySelector(".mo-slides-theme.reveal");
    }

    function getSlides(deck) {
      var slidesEl = deck.querySelector(":scope > .slides");
      if (!slidesEl) return [];
      return Array.prototype.slice.call(slidesEl.children);
    }

    function getCurrentIndex(slides) {
      for (var i = 0; i < slides.length; i++) {
        if (slides[i].classList.contains("present")) return i;
      }
      // Reveal.js sometimes hides .present on the very first paint; default
      // to the first slide so the badge isn't blank while it spins up.
      return slides.length > 0 ? 0 : -1;
    }

    function update() {
      var deck = getDeck();
      if (!deck) {
        badge.textContent = "";
        return;
      }
      var slides = getSlides(deck);
      var idx = getCurrentIndex(slides);
      if (idx < 0 || slides.length === 0) {
        badge.textContent = "";
      } else {
        badge.textContent = (idx + 1) + " / " + slides.length;
      }
    }

    // Marimo loads as an ES module, so its React tree (and therefore the
    // .mo-slides-theme.reveal root) is added to the DOM after our script
    // runs. Observe subtree changes on <body> and react whenever the deck
    // materializes or Reveal.js toggles .present on a slide.
    var mo = new MutationObserver(update);
    mo.observe(document.body, {
      childList: true,
      subtree: true,
      attributes: true,
      attributeFilter: ["class"],
    });
    update();
  })();
</script>
