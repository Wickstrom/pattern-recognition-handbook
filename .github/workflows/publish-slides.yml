name: Publish slides

# Rebuild and deploy the Reveal.js slide decks on every push to main.
# The workflow renders the notebooks with Quarto and pushes the output to the
# gh-pages branch, which GitHub Pages serves at:
#   https://<owner>.github.io/<repo>/

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# The deploy step needs contents:write (to push the gh-pages branch) and
# pages:write + id-token:write (for the official GitHub Pages deploy action).
permissions:
  contents: write
  pages: write
  id-token: write

# Don't allow two deploys to run at the same time — they would race on the
# gh-pages branch.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib ucimlrepo scipy scikit-learn ipykernel jupyter

      - name: Render notebooks to Reveal.js
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: revealjs

      - name: Upload _slides/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _slides

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
