name: Publish slides

# Rebuild and deploy the Reveal.js slide decks on every push to main.
# Uses `jupyter nbconvert --to slides`, which produces the same RISE-style
# Reveal.js output (nested horizontal slides + vertical sub-slides driven by
# the cell-level slide_type metadata) but as static HTML so it never times
# out. Output is deployed to GitHub Pages via the official Pages API.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Don't allow two deploys to run at the same time — they would race on the
# gh-pages branch.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib ucimlrepo scipy scikit-learn ipykernel jupyter

      - name: Convert notebooks to slides
        run: |
          mkdir -p _slides/notebooks
          for nb in notebooks/*/*.ipynb; do
            dir=$(dirname "$nb")
            base=$(basename "$nb" .ipynb)
            target="_slides/$dir"
            mkdir -p "$target"
            # Copy media alongside the notebook so relative image paths resolve.
            cp -R "$dir/media" "$target/" 2>/dev/null || true
            # nbconvert appends ".slides" + ".html" to --output, so pass just
            # the basename to get "<base>.slides.html".
            jupyter nbconvert --to slides "$nb" \
              --output-dir "$target" \
              --output "$base"
          done

      - name: Copy index.html into _slides/
        run: cp index.html _slides/index.html

      - name: Upload _slides/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _slides

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
