name: Publish slides

# Rebuild and deploy the Reveal.js slide decks on every push to main.
# Uses `jupyter nbconvert --to slides`, which produces the same RISE-style
# Reveal.js output (nested horizontal slides + vertical sub-slides driven by
# the cell-level slide_type metadata) but as static HTML so it never times
# out. Output is deployed to GitHub Pages via the official Pages API.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Don't allow two deploys to run at the same time — they would race on the
# gh-pages branch.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib ucimlrepo scipy scikit-learn ipykernel jupyter ipywidgets plotly

      - name: Convert notebooks to slides
        run: |
          mkdir -p _slides/notebooks
          for nb in notebooks/*/*.ipynb; do
            dir=$(dirname "$nb")
            base=$(basename "$nb" .ipynb)
            target="_slides/$dir"
            mkdir -p "$target"
            # Copy media alongside the notebook so relative image paths resolve.
            cp -R "$dir/media" "$target/" 2>/dev/null || true
            # nbconvert appends ".slides" + ".html" to --output, so pass just
            # the basename to get "<base>.slides.html".
            jupyter nbconvert --to slides "$nb" \
              --output-dir "$target" \
              --output "$base"
          done

      # nbconvert's reveal template adds cell-tag classes (e.g.
      # celltag_remove-input) but does not ship CSS that actually hides the
      # input — the source code stays in the rendered slide. Inject CSS so
      # tagged cells render as output-only.
      - name: Inject cell-tag CSS into slide HTML
        run: |
          python - <<'PY'
          import glob, pathlib
          css = (
              "<style id='celltag-overrides'>"
              ".celltag_remove-input .jp-Cell-inputWrapper,"
              ".celltag_remove-cell  .jp-Cell-inputWrapper{display:none!important}"
              ".celltag_remove-input .jp-Cell,"
              ".celltag_remove-cell  .jp-Cell{padding-top:0;margin-top:0}"
              "</style>"
          )
          for html in glob.glob("_slides/**/*.slides.html", recursive=True):
              p = pathlib.Path(html)
              s = p.read_text(encoding="utf-8")
              if "celltag-overrides" in s:
                  continue
              p.write_text(s.replace("</head>", css + "</head>", 1), encoding="utf-8")
              print(f"injected: {p}")
          PY

      - name: Copy index.html into _slides/
        run: cp index.html _slides/index.html

      - name: Upload _slides/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _slides

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
