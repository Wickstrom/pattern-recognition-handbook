name: Publish slides

# Rebuild and deploy the Reveal.js slide decks and Marimo WASM notebooks
# on every push to main. Uses `jupyter nbconvert --to slides` for the
# .ipynb files and `marimo export html-wasm` for the .py notebooks, both
# deployed together to GitHub Pages via the official Pages API.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Don't allow two deploys to run at the same time — they would race on the
# gh-pages branch.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Convert notebooks to slides
        run: |
          mkdir -p _slides/notebooks
          for nb in notebooks/*/*.ipynb; do
            dir=$(dirname "$nb")
            base=$(basename "$nb" .ipynb)
            target="_slides/$dir"
            mkdir -p "$target"
            # Copy media alongside the notebook so relative image paths resolve.
            cp -R "$dir/media" "$target/" 2>/dev/null || true
            # Skip exercise notebooks — they're classic Jupyter notebooks for
            # students to work in locally, not slide decks to be deployed.
            case "$base" in
              *_exercise) echo "Skipping $nb — exercise notebook"; continue ;;
            esac
            # Skip if this notebook was replaced by a Marimo .py counterpart.
            if [ -f "$dir/$base.py" ]; then
              echo "Skipping $nb — Marimo counterpart at $dir/$base.py"
              continue
            fi
            # nbconvert appends ".slides" + ".html" to --output, so pass just
            # the basename to get "<base>.slides.html".
            uv run jupyter nbconvert --to slides "$nb" \
              --output-dir "$target" \
              --output "$base"
          done

      # Export Marimo notebooks (paired .py files next to .ipynb files) to a
      # WASM-runnable directory under _slides/. The exported dir contains an
      # index.html, an assets/ directory, and a .nojekyll file — the assets
      # must live next to the HTML, so we point the workflow at the notebook's
      # own subdirectory rather than a flat file.
      - name: Export Marimo notebooks to WASM
        run: |
          for nb in notebooks/*/*.py; do
            dir=$(dirname "$nb")
            base=$(basename "$nb" .py)
            target="_slides/$dir/$base"
            mkdir -p "$target"
            # Copy media alongside the notebook so relative image paths resolve.
            cp -R "$dir/media" "$target/" 2>/dev/null || true
            # The notebook's `layout_file` (e.g. layouts/<base>.slides.json) is
            # read by marimo at export time and inlined as a base64 data URI
            # in the generated HTML, so we don't need to ship the JSON.
            # `--no-show-code` keeps the slides looking like slides — code is
            # still editable in `marimo edit` locally, just hidden in the
            # public deck by default.
            uv run marimo export html-wasm "$nb" -o "$target" --mode run --no-show-code
          done

      # nbconvert's reveal template adds cell-tag classes (e.g.
      # celltag_remove-input) but does not ship CSS that actually hides the
      # input — the source code stays in the rendered slide. Inject CSS so
      # tagged cells render as output-only.
      - name: Inject cell-tag CSS into slide HTML
        run: |
          uv run python - <<'PY'
          import glob, pathlib
          css = (
              "<style id='celltag-overrides'>"
              ".celltag_remove-input .jp-Cell-inputWrapper,"
              ".celltag_remove-cell  .jp-Cell-inputWrapper{display:none!important}"
              ".celltag_remove-input .jp-Cell,"
              ".celltag_remove-cell  .jp-Cell{padding-top:0;margin-top:0}"
              "</style>"
          )
          for html in glob.glob("_slides/**/*.slides.html", recursive=True):
              p = pathlib.Path(html)
              s = p.read_text(encoding="utf-8")
              if "celltag-overrides" in s:
                  continue
              p.write_text(s.replace("</head>", css + "</head>", 1), encoding="utf-8")
              print(f"injected: {p}")
          PY

      # Marimo's WASM export already drops a .nojekyll marker in its output
      # directory so GitHub Pages doesn't try to process the assets. Make
      # sure the root _slides/ directory also has one — this matters if we
      # ever serve / index.html directly.
      - name: Ensure .nojekyll exists at the publish root
        run: |
          if [ ! -f _slides/.nojekyll ]; then
            touch _slides/.nojekyll
          fi

      - name: Copy index.html into _slides/
        run: cp index.html _slides/index.html

      - name: Upload _slides/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _slides

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
